services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lead-scraper-backend
    network_mode: "host"
    volumes:
      - /root/steves-dev/lead-scraper-data:/app/data
    environment:
      - PORT=4000
      - WS_PORT=4001
      - NODE_ENV=production
      - CHROME_CDP_URL=ws://127.0.0.1:3012
      - FLARESOLVER_URL=http://127.0.0.1:8191/v1
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: lead-scraper-flaresolverr
    network_mode: "host"
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lead-scraper-frontend
    network_mode: "host"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    restart: unless-stopped
